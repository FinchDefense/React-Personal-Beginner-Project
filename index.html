<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    .task-item {
      display: flex;
      gap: 20px;
    }
  </style>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 Task Tracker with Filter</title>
</head>
<body>
  <div class="js-container"></div>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">
    function App() { // Parent Component
      const [tasks, setTasks] = React.useState([
        { id: 1, text: 'Learn React', category: 'Personal', completed: false },
        { id: 2, text: 'Build a project', category: 'Work', completed: true },
      ]);

      const[filter, setFilter] = React.useState('All');
      const [searchTerm, setSearchTerm] = React.useState('');

      function addTask(text, category) {
        const newTask = {
          text: text,
          category: category,
          id: crypto.randomUUID(),
          completed: false
        };
        setTasks([...tasks, newTask]);
      }

      function deleteTask(id) {
        setTasks((prevTasks) =>
          prevTasks.filter((task => task.id !== id))
        );
      }

      function toggleTask(id) {
        setTasks(prev =>
          prev.map((task) =>
            task.id === id ? {...task, completed: !task.completed} : task)
        );
      }

      return (
        <div className="app">
          <h1>Task Tracker</h1>
          <TaskForm onAddTask={addTask} />
          <TaskList 
            tasks={tasks}
            onToggleTask={toggleTask}
            onDeleteTask={deleteTask}
          />
        </div>
      )
    }

    function TaskForm({ onAddTask }) {
      const [text, setText] = React.useState('');
      const [category, setCategory] = React.useState('Personal');

      const handleSubmit = (e) => {
        e.preventDefault(); // Prevents page refresh
        
        if (!text.trim()) { // Check if the task has no text
          alert('Please enter a task');  
          return;  // Don't call onAddTask
        }

        onAddTask(text.trim(), category);
        setText('');
        setCategory('Personal');
      };

      return (
        <form onSubmit={handleSubmit}>
          <>
            <input
              value={text}
              onChange={(e)=>setText(e.target.value)}
              placeholder="Enter task..."
            />
            <select
              value={category} 
              onChange={(e) => setCategory(e.target.value)}
            >  
              <option value="Work">Work</option>
              <option value="Personal">Personal</option>
              <option value="Urgent">Urgent</option>
            </select>
            <button type="submit">Add Task</button>
          </>
        </form>
      )
    }
  

    function TaskList({ tasks, onToggleTask, onDeleteTask }) {
      return (
        <ul>
          {tasks.map((task) => (
            <TaskItem
              key = {task.id}
              task = {task}
              onToggle={() => onToggleTask(task.id)}
              onDelete={() => onDeleteTask(task.id)}  
            />
          ))}
        </ul>
      )
    }
    
    function TaskItem({ task, onToggle, onDelete }) {
      return (
        <li>
          <div className="task-item">
            <span 
              style={{ textDecoration: task.completed ? 'line-through' : 'none' }}
              onClick={onToggle}>
              {task.text}
            </span>
            <span className={`category-${task.category}`}>
              {task.category}
            </span>
            <button onClick={onDelete}>
              ❌
            </button>
          </div>
        </li>
      )
    }

    function TaskFilters({ filter, onFilterChange, searchTerm, onSearchChange }) {
      return (
        <div>
          <button>All</button>
          <button>Active</button>
          <button>Completed</button>

          <input />
        </div>
      );
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />)
  </script>
</body>
</html>
